name: Android 内核构建-自定义

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # ==================== 内核版本配置 ====================
      kernel_version:
        description: "内核版本"
        required: true
        type: choice
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
          - "6.12"
        default: "5.10"
      os_patch_level:
        description: "安全补丁级别 (如 2022-01, lts)"
        required: true
        type: string
        default: "2022-01"

      # ==================== KernelSU 配置 ====================
      kernelsu_variant:
        description: "KernelSU 变体"
        required: true
        type: choice
        options:
          - Official
          #- Next
          - SukiSU
          - SukiSU(40726)
          - SukiSU(40548)
          - ReSukiSU
          - KittiSU
        default: KittiSU

      kittisu_repo:
        description: "KittiSU GitHub repo (owner/name)"
        required: false
        type: string
        default: "terebiko/KittiSU"
      kittisu_branch:
        description: "KittiSU branch/tag/commit (custom branch supported)"
        required: false
        type: string
        default: "main"

      # ==================== 可选配置 ====================
      version:
        description: "自定义版本名 (可选)"
        required: false
        type: string
      build_time:
        description: "自定义构建时间 (可选，N或留空=当前UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"

      # ==================== 选项配置 ====================
      use_kpm:
        description: "KPM 功能（patched 尚不支持）"
        required: true
        type: choice
        default: "disabled (关闭)"
        options:
          - "disabled (关闭)"
          - "enabled (开启)"
          - "patched (开启并修补，尚不支持)"
      droidspaces:
        description: "Droidspaces 容器支持 (5.10~6.6: 槽位补丁, 6.12: 开/关)"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      artifact_upload_mode:
        description: "构建产物上传模式"
        required: true
        type: choice
        options:
          - "仅上传 AnyKernel3.zip"
          - "上传全部"
        default: "仅上传 AnyKernel3.zip"
      droidspaces_ntsync:
        description: "启用 Droidspaces 容器 NTSync 支持（需启用 Droidspaces）"
        required: false
        type: boolean
        default: false

      # ==================== 功能开关 ====================
      use_zram:
        description: "启用 ZRAM 增强算法"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "启用 BBG 防格机"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "启用 Re-Kernel 驱动"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "禁用 SUSFS"
        required: true
        type: boolean
        default: false
      supp_op:
        description: "启用一加 8E 支持"
        required: false
        type: boolean
        default: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      android_version: ${{ steps.resolve.outputs.android_version }}
      sub_level: ${{ steps.resolve.outputs.sub_level }}
      kernel_full: ${{ steps.resolve.outputs.kernel_full }}
    steps:
      - name: 检出版本数据
        uses: actions/checkout@v4

      - name: 解析安全补丁级别
        id: resolve
        env:
          KERNEL_VERSION: ${{ inputs.kernel_version }}
          OS_PATCH_LEVEL: ${{ inputs.os_patch_level }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          kernel_version = os.environ["KERNEL_VERSION"]
          os_patch_level = os.environ["OS_PATCH_LEVEL"].strip()
          android_map = {
              "5.10": "android12",
              "5.15": "android13",
              "6.1": "android14",
              "6.6": "android15",
              "6.12": "android16",
          }
          android_version = android_map.get(kernel_version)
          if android_version is None:
              print(f"::error::未适配的内核版本: {kernel_version}")
              sys.exit(1)

          data_path = Path("data") / android_version / f"{kernel_version}.json"

          if not data_path.exists():
              print(f"::error::未找到版本数据: {data_path}")
              sys.exit(1)

          with data_path.open("r", encoding="utf-8") as f:
              data = json.load(f)

          if os_patch_level == "lts":
              kernel_full = data.get("lts")
              if not kernel_full:
                  print(f"::error::{android_version} / {kernel_version} 缺少 LTS 版本数据")
                  sys.exit(1)
              sub_level = "X"
          else:
              matched = next(
                  (entry for entry in data.get("entries", []) if entry.get("date") == os_patch_level),
                  None,
              )
              if matched is None:
                  print(f"::error::未找到 {android_version} / {kernel_version} / {os_patch_level} 对应的版本数据")
                  sys.exit(1)
              kernel_full = matched.get("kernel", "")
              prefix = f"{kernel_version}."
              if not kernel_full.startswith(prefix):
                  print(f"::error::版本数据异常: {kernel_full} 不属于 {kernel_version}")
                  sys.exit(1)
              sub_level = kernel_full.rsplit(".", 1)[-1]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"android_version={android_version}\n")
              output.write(f"sub_level={sub_level}\n")
              output.write(f"kernel_full={kernel_full}\n")

          print(f"解析结果: {android_version} / {kernel_full}，子版本号: {sub_level}")
          PY

  build-custom-kernel:
    name: "${{ needs.resolve-version.outputs.kernel_full }}-${{ needs.resolve-version.outputs.android_version }}-${{ inputs.os_patch_level }}"
    needs: resolve-version
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ needs.resolve-version.outputs.android_version }}
      kernel_version: ${{ inputs.kernel_version }}
      sub_level: ${{ needs.resolve-version.outputs.sub_level }}
      os_patch_level: ${{ inputs.os_patch_level }}
      revision: "r1"
      ksu_variant: ${{ inputs.kernelsu_variant }}
      kittisu_repo: ${{ inputs.kittisu_repo || 'terebiko/KittiSU' }}
      kittisu_branch: ${{ inputs.kittisu_branch || 'main' }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: ${{ inputs.supp_op || false }}
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}
      droidspaces_ntsync: ${{ inputs.droidspaces_ntsync || false }}
      artifact_upload_mode: ${{ inputs.artifact_upload_mode }}

  get-ksu-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kittisu_repo: ${{ inputs.kittisu_repo || 'terebiko/KittiSU' }}
      kittisu_branch: ${{ inputs.kittisu_branch || 'main' }}
